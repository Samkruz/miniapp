<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Kineiro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 20% 30%, #3b82f6, transparent 40%),
radial-gradient(circle at 80% 70%, #9333ea, transparent 40%),
#020617;
}

.card{
backdrop-filter:blur(20px);
background:rgba(15,23,42,0.7);
padding:30px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 0 40px rgba(59,130,246,0.4);
}

select,input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:15px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:15px;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
font-size:16px;
cursor:pointer;
}

.idea{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:8px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="card">

<h2>Kineiro</h2>
<p>Получите идеи постов</p>

<select id="niche">

<option value="">Выберите нишу</option>
<option value="beauty">Салон красоты</option>
<option value="dentist">Стоматология</option>
<option value="fitness">Фитнес клуб</option>
<option value="restaurant">Ресторан / кафе</option>
<option value="shop">Интернет-магазин</option>
<option value="realestate">Недвижимость</option>
<option value="education">Образование</option>
<option value="coach">Психолог / коуч</option>
<option value="autoservice">Автосервис</option>
<option value="clinic">Медицинская клиника</option>
<option value="law">Юридические услуги</option>
<option value="marketing">Маркетинг</option>
<option value="travel">Туризм</option>
<option value="construction">Строительство</option>
<option value="expert">Личный бренд</option>

</select>

<button onclick="generateIdeas()">Получить идеи</button>

<div id="ideas"></div>

<div id="leadForm" style="display:none">

<input id="name" placeholder="Ваше имя">

<button onclick="sendLead()">Получить контент план</button>

</div>

</div>

<script>

const ideas = {

beauty:[
"5 ошибок в уходе за волосами",
"До/после клиента",
"Как выбрать мастера",
"Тренды красоты 2025",
"Разбор популярного мифа"
],

dentist:[
"5 ошибок при чистке зубов",
"Когда менять зубную щётку",
"Мифы о брекетах",
"История пациента",
"Ответ стоматолога на вопрос"
],

fitness:[
"5 упражнений для новичков",
"Ошибка №1 в тренировках",
"История клиента",
"План питания",
"Тренировка дома"
],

restaurant:[
"Блюдо недели",
"Как готовится фирменное блюдо",
"Отзывы гостей",
"История ресторана",
"Совет шефа"
],

shop:[
"Товар недели",
"Как выбрать продукт",
"Отзывы клиентов",
"ТОП-5 товаров",
"Разбор популярного вопроса"
]

};

function generateIdeas(){

let niche=document.getElementById("niche").value;

if(!niche){
alert("Выберите нишу");
return;
}

let list=ideas[niche] || ["Идея поста 1","Идея поста 2","Идея поста 3"];

let html="<h3>Идеи постов:</h3>";

list.forEach(i=>{
html+=`<div class="idea">${i}</div>`
});

document.getElementById("ideas").innerHTML=html;

document.getElementById("leadForm").style.display="block";

}

function sendLead(){

let name=document.getElementById("name").value;
let niche=document.getElementById("niche").value;

let message=`Новая заявка Kineiro

Имя: ${name}
Ниша: ${niche}`;

fetch(`https://api.telegram.org/bot8639552988:AAGi3x43OyD5PrRDyOUKrvNk6Ew2sHXDy8Q/sendMessage?chat_id=350662896&text=`+encodeURIComponent(message));

alert("Спасибо! Мы свяжемся с вами.");

}

</script>

</body>
</html>
