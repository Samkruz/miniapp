<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Kineiro AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 20% 30%, #3b82f6, transparent 40%),
radial-gradient(circle at 80% 70%, #9333ea, transparent 40%),
#020617;
overflow:hidden;
}

.glow{
position:absolute;
width:400px;
height:400px;
background:#3b82f6;
filter:blur(200px);
opacity:0.4;
top:-100px;
left:-100px;
animation:move1 10s infinite alternate;
}

.glow2{
position:absolute;
width:400px;
height:400px;
background:#9333ea;
filter:blur(200px);
opacity:0.4;
bottom:-100px;
right:-100px;
animation:move2 10s infinite alternate;
}

@keyframes move1{
0%{transform:translate(0,0);}
100%{transform:translate(200px,100px);}
}

@keyframes move2{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-100px);}
}

.card{

backdrop-filter:blur(20px);
background:rgba(15,23,42,0.6);
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 30px rgba(59,130,246,0.3);
}

h1{
font-size:22px;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

button{

width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:20px;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:20px;
text-align:left;
}

.idea{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.loader{

margin-top:20px;
display:none;

}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="card">

<h1>Получите идеи постов</h1>
<p>для вашего бизнеса</p>

<input id="niche" placeholder="например: стоматология">

<button onclick="generateIdeas()">
Получить идеи
</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

let ideas = [

"5 ошибок клиентов в этой нише",
"ответ на популярный вопрос",
"кейс клиента до/после",
"миф о вашем продукте",
"3 совета эксперта",
"частая проблема клиентов",
"разбор ошибки",
"история бизнеса",
"чеклист для клиента",
"полезный лайфхак"

];

function generateIdeas(){

let niche=document.getElementById("niche").value;

if(!niche){
alert("Введите нишу");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(()=>{

document.getElementById("loader").style.display="none";

let html="<h3>Идеи постов:</h3>";

for(let i=0;i<5;i++){

let random=ideas[Math.floor(Math.random()*ideas.length)];

html+=`<div class="idea">${random}</div>`;

}

html+=`<button onclick="contact('${niche}')">Получить 30 постов каждый месяц</button>`;

document.getElementById("result").innerHTML=html;

},1500);

}

function contact(niche){

let message=`Хочу контент план\nНиша: ${niche}`;

let url="https://t.me/Simon_sergeevich?text="+encodeURIComponent(message);

window.open(url);

}

</script>

</body>
</html>
