<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kineiro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
}

.card{
background:#0f172a;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
}

select,input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:15px;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
cursor:pointer;
}

.idea{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
}
</style>

</head>

<body>

<div class="card">

<h2>Kineiro</h2>
<p>Получите идеи постов</p>

<select id="niche">
<option value="">Выберите нишу</option>
<option value="beauty">Салон красоты</option>
<option value="dentist">Стоматология</option>
<option value="fitness">Фитнес клуб</option>
<option value="restaurant">Ресторан</option>
<option value="shop">Интернет-магазин</option>
</select>

<button onclick="generateIdeas()">Получить идеи</button>

<div id="ideas"></div>

<div id="lead" style="display:none">

<input id="name" placeholder="Введите имя">

<button onclick="sendLead()">Получить контент-план</button>

</div>

</div>

<script>

let tg = window.Telegram?.WebApp;

let user = {};
if(tg){
tg.expand();
user = tg.initDataUnsafe?.user || {};
}

const BOT_TOKEN="8639552988:AAGi3x43OyD5PrRDyOUKrvNk6Ew2sHXDy8Q";
const CHAT_ID="350662896";

const ideas = {
beauty:["5 ошибок в уходе за волосами","Тренды маникюра","До/после клиента"],
dentist:["5 ошибок при чистке зубов","Когда менять щетку","Мифы о брекетах"],
fitness:["5 упражнений для новичков","Ошибка №1 в тренировках","План питания"],
restaurant:["Блюдо недели","Совет шефа","История ресторана"],
shop:["Товар недели","Отзывы клиентов","ТОП товаров"]
};

function generateIdeas(){

let niche=document.getElementById("niche").value;

if(!niche){
alert("Выберите нишу");
return;
}

let list=ideas[niche];

let html="<h3>Идеи постов:</h3>";

for(let i=0;i<list.length;i++){
html+="<div class='idea'>"+list[i]+"</div>";
}

document.getElementById("ideas").innerHTML=html;

document.getElementById("lead").style.display="block";

}

function sendLead(){

let name=document.getElementById("name").value;

let nicheText=document.getElementById("niche").options[
document.getElementById("niche").selectedIndex].text;

let contact=user.username
? "https://t.me/"+user.username
: "tg://user?id="+user.id;

let message="🔥 Новая заявка Kineiro\n\n"+
"Имя: "+name+"\n"+
"Ниша: "+nicheText+"\n\n"+
"Telegram: "+contact;

fetch("https://api.telegram.org/bot"+BOT_TOKEN+
"/sendMessage?chat_id="+CHAT_ID+
"&text="+encodeURIComponent(message));

alert("Заявка отправлена");

}

</script>

</body>
</html>
